name: Phase 70 Traffic and Financial Safety

on:
  workflow_dispatch:
  pull_request:
    paths:
      - 'src/main/java/com/example/switching/traffic/**'
      - 'src/main/java/com/example/switching/consistency/**'
      - 'src/main/java/com/example/switching/promotion/reconciliation/**'
      - 'src/main/java/com/example/switching/security/filter/RateLimitFilter.java'
      - 'src/main/java/com/example/switching/webhook/crypto/WebhookEncryptionConfiguration.java'
      - 'src/main/java/com/example/switching/crossborder/**'
      - 'src/test/java/com/example/switching/**'
      - 'config/phase70-participant-traffic-policy.yaml'
      - 'scripts/phase70/**'
      - 'schemas/phase70/**'
      - '.github/workflows/phase70-traffic-financial-safety.yml'

permissions:
  contents: read

jobs:
  verify-phase70:
    runs-on: ubuntu-latest
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: maven
      - name: Phase 70 static contract
        run: ./scripts/phase70/run_phase70.sh preflight
      - name: Phase 70 compile, targeted tests and full gate
        run: ./scripts/phase70/run_phase70.sh verify
      - name: Upload Phase 70 evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: phase70-evidence
          path: evidence/phase70/
          if-no-files-found: error
