name: Phase 77 Continuous Assurance
on:
  workflow_dispatch:
  pull_request:
    paths:
      - 'scripts/phase77/**'
      - 'config/phase77/**'
      - 'schemas/phase77/**'
      - 'src/main/java/com/example/switching/continuousassurance/**'
      - 'src/test/java/com/example/switching/continuousassurance/**'
jobs:
  preflight:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: '3.12' }
      - run: pip install pyyaml jsonschema
      - run: scripts/execute-and-verify/16-phase77-continuous-assurance.sh
      - uses: actions/upload-artifact@v4
        if: always()
        with: { name: phase77-preflight, path: evidence/phase77/ }
