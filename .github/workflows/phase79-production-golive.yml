name: Phase 79 Production Go-Live
on:
  workflow_dispatch:
jobs:
  preflight:
    runs-on: ubuntu-latest
    environment: production-approval
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: {python-version: "3.12"}
      - run: python3 scripts/verify_phase78_79_static.py
      - run: scripts/phase79/run_phase79.sh --preflight
