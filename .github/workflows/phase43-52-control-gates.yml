name: Phase 43-52 control gates

on:
  pull_request:
    paths:
      - 'src/main/java/com/example/switching/{limits,adjustments,settlement,finality,crypto,dependency,capacity,lineage,rules,decommission}/**'
      - 'src/main/resources/db/migration/V7[3-9]__*.sql'
      - 'src/main/resources/db/migration/V8[0-2]__*.sql'
      - 'scripts/**'
      - 'k8s/**'
      - 'monitoring/**'
      - '.github/workflows/phase43-52-control-gates.yml'
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: maven
      - uses: actions/setup-python@v5
        with:
          python-version: '3.13'
      - run: pip install --disable-pip-version-check pyyaml
      - name: Static governance contracts
        run: python3 scripts/verify_phases_43_52_static.py
      - name: Full build and test gate
        run: ./mvnw --batch-mode --no-transfer-progress clean verify
      - name: Assemble control evidence
        if: always()
        run: |
          mkdir -p build/phase43-52-control-evidence
          cp -r target/surefire-reports build/phase43-52-control-evidence/ 2>/dev/null || true
          cp PHASES_43_52_DELIVERY_NOTES.md build/phase43-52-control-evidence/
          sha256sum build/phase43-52-control-evidence/* 2>/dev/null \
            > build/phase43-52-control-evidence/SHA256SUMS || true
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: phase43-52-control-evidence
          path: build/phase43-52-control-evidence/
          if-no-files-found: warn
          retention-days: 90
