name: Immutable image build

on:
  workflow_run:
    workflows: [CI]
    types: [completed]
  workflow_dispatch:
    inputs:
      commit_sha:
        description: Commit SHA already certified by CI
        required: true
        type: string

permissions:
  contents: read
  packages: write
  id-token: write

jobs:
  build-and-push:
    if: >-
      github.event_name == 'workflow_dispatch' ||
      github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    outputs:
      image_digest: ${{ steps.digest.outputs.image_digest }}
      migration_image_digest: ${{ steps.digest.outputs.migration_image_digest }}
    env:
      REGISTRY: ghcr.io
      IMAGE_REPOSITORY: ghcr.io/${{ github.repository_owner }}/switching-api
      DIGEST_EVIDENCE_PREFIX: "digest: sha256:"
    steps:
      - name: Resolve certified commit
        id: source
        shell: bash
        run: |
          set -euo pipefail
          if [[ "${{ github.event_name }}" == "workflow_run" ]]; then
            commit="${{ github.event.workflow_run.head_sha }}"
          else
            commit="${{ inputs.commit_sha }}"
          fi
          [[ "$commit" =~ ^[0-9a-fA-F]{40}$ ]] || { echo "A full commit SHA is required" >&2; exit 2; }
          echo "commit_sha=${commit,,}" >> "$GITHUB_OUTPUT"

      - uses: actions/checkout@v4
        with:
          ref: ${{ steps.source.outputs.commit_sha }}
          fetch-depth: 1

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: maven

      - name: Package certified source
        run: ./mvnw -B -DskipTests package

      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build immutable images
        shell: bash
        run: |
          set -euo pipefail
          commit='${{ steps.source.outputs.commit_sha }}'
          docker build --pull \
            --build-arg "BUILD_COMMIT=$commit" \
            --build-arg "BUILD_IMAGE=$IMAGE_REPOSITORY:$commit" \
            --label "org.opencontainers.image.revision=$commit" \
            -t "$IMAGE_REPOSITORY:$commit" .
          # The migration Job intentionally runs the same certified JAR with the
          # migration profile/PropertiesLauncher. Publish a second immutable
          # repository reference instead of building a divergent binary.
          docker tag "$IMAGE_REPOSITORY:$commit" "$IMAGE_REPOSITORY-migration:$commit"

      - name: Verify migration image before publication
        run: scripts/verify_migration_image.sh "$IMAGE_REPOSITORY-migration:${{ steps.source.outputs.commit_sha }}"

      - name: Push immutable images
        shell: bash
        run: |
          set -euo pipefail
          docker push "$IMAGE_REPOSITORY:${{ steps.source.outputs.commit_sha }}"
          docker push "$IMAGE_REPOSITORY-migration:${{ steps.source.outputs.commit_sha }}"

      - name: Capture repository digests
        id: digest
        shell: bash
        run: |
          set -euo pipefail
          app_ref="$(docker inspect --format='{{index .RepoDigests 0}}' "$IMAGE_REPOSITORY:${{ steps.source.outputs.commit_sha }}")"
          migration_ref="$(docker inspect --format='{{index .RepoDigests 0}}' "$IMAGE_REPOSITORY-migration:${{ steps.source.outputs.commit_sha }}")"
          [[ "$app_ref" == *@sha256:* ]] || { echo "Application image is not digest pinned" >&2; exit 3; }
          [[ "$migration_ref" == *@sha256:* ]] || { echo "Migration image is not digest pinned" >&2; exit 3; }
          echo "image_digest=${app_ref#*@}" >> "$GITHUB_OUTPUT"
          echo "migration_image_digest=${migration_ref#*@}" >> "$GITHUB_OUTPUT"
          printf 'commit=%s\napplication=%s\nmigration=%s\n' \
            '${{ steps.source.outputs.commit_sha }}' "$app_ref" "$migration_ref" | tee image-digests.txt

      - uses: actions/upload-artifact@v4
        with:
          name: immutable-image-digests-${{ steps.source.outputs.commit_sha }}
          path: image-digests.txt
          if-no-files-found: error
          retention-days: 90
