name: Security Gates

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  workflow_dispatch:
  workflow_call:
    inputs:
      dependency_review_enabled:
        description: Run dependency review outside pull requests
        required: false
        type: boolean
        default: false
  schedule:
    - cron: "17 19 * * 1"

permissions:
  contents: read
  security-events: write
  pull-requests: read

concurrency:
  group: security-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  repository-hygiene:
    name: Repository Hygiene
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - name: Verify tracked files and literal-secret policy
        run: |
          chmod +x security/scripts/*.sh security/scripts/*.py security/tests/*.sh
          security/scripts/verify-repository-hygiene.sh --json-report build/security-history/repository-hygiene.json
      - name: Verify prohibited paths are absent from Git history
        run: security/scripts/scan-git-history.sh --skip-gitleaks
      - name: Run repository hygiene regression tests
        run: security/tests/repository-hygiene-test.sh
      - name: Run local environment generator regression test
        run: security/tests/generate-local-env-test.sh
      - name: Upload redacted repository-security evidence
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: repository-security-${{ github.sha }}
          path: build/security-history/
          if-no-files-found: warn
          retention-days: 30

  policy-static:
    name: Security Policy Static Checks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Sensitive logging and production policy checks
        run: |
          security/scripts/check-sensitive-logging.sh
          grep -q 'followRedirects(Redirect.NEVER)' src/main/java/com/example/switching/webhook/service/WebhookHttpSender.java
          grep -q 'require-allowlist: true' src/main/resources/application-prod.yml
          grep -q 'auth-tls-verify-client: "on"' k8s/ingress.yaml
          ! grep -RIn 'image: .*:latest' k8s

  gitleaks:
    name: Gitleaks Secret Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - uses: gitleaks/gitleaks-action@v3
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  dependency-review:
    name: Dependency Review
    if: github.event_name == 'pull_request' || inputs.dependency_review_enabled == true
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/dependency-review-action@v5
        with:
          fail-on-severity: high

  owasp-dependency-check:
    name: OWASP Dependency Check
    runs-on: ubuntu-latest
    timeout-minutes: 35
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-java@v5
        with:
          java-version: "21"
          distribution: temurin
          cache: maven
      - name: Scan Maven dependencies
        env:
          NVD_API_KEY: ${{ secrets.NVD_API_KEY }}
        shell: bash
        run: |
          set -Eeuo pipefail
          chmod +x mvnw
          args=(--batch-mode --no-transfer-progress -DskipTests
                org.owasp:dependency-check-maven:12.2.2:check
                -DfailBuildOnCVSS=7
                -Dformats=HTML,JSON)
          if [[ -n "${NVD_API_KEY:-}" ]]; then
            args+=("-DnvdApiKey=${NVD_API_KEY}")
          fi
          ./mvnw "${args[@]}"
      - name: Upload OWASP report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: owasp-dependency-check-${{ github.sha }}
          path: target/dependency-check-report.*
          if-no-files-found: warn
          retention-days: 30

  trivy-filesystem:
    name: Trivy Repository Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Scan repository and dependencies
        uses: aquasecurity/trivy-action@v0.35.0
        with:
          scan-type: fs
          scan-ref: .
          format: sarif
          output: trivy-fs.sarif
          severity: HIGH,CRITICAL
          ignore-unfixed: true
          exit-code: "1"
      - name: Upload Trivy repository SARIF
        if: always()
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: trivy-fs.sarif
          category: trivy-filesystem

  trivy-container:
    name: Trivy Container Scan
    runs-on: ubuntu-latest
    timeout-minutes: 35
    steps:
      - uses: actions/checkout@v6
      - name: Build container for scanning
        run: docker build --tag switching-api:security-scan .
      - name: Scan container image
        uses: aquasecurity/trivy-action@v0.35.0
        with:
          image-ref: switching-api:security-scan
          format: sarif
          output: trivy-container.sarif
          severity: HIGH,CRITICAL
          ignore-unfixed: true
          exit-code: "1"
      - name: Upload Trivy container SARIF
        if: always()
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: trivy-container.sarif
          category: trivy-container

  codeql:
    name: CodeQL SAST
    runs-on: ubuntu-latest
    timeout-minutes: 35
    steps:
      - uses: actions/checkout@v6
      - uses: github/codeql-action/init@v4
        with:
          languages: java-kotlin
          queries: security-extended
      - uses: github/codeql-action/autobuild@v4
      - uses: github/codeql-action/analyze@v4
        with:
          category: /language:java-kotlin
