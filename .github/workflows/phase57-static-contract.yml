name: Phase 57 Static Contract
on:
  pull_request:
  push:
    branches: [main]
permissions:
  contents: read
jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: {python-version: '3.12'}
      - run: pip install pyyaml
      - run: python3 scripts/verify_phase57_static.py
      - run: python3 -m unittest -v scripts.enterprise.tests.test_phase57_framework
      - name: Validate shell syntax
        run: find scripts/enterprise -type f -name '*.sh' -print0 | xargs -0 -n1 bash -n
