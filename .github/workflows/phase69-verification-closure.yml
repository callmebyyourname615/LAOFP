name: Phase 69 verification closure

on:
  pull_request:
    paths:
      - 'src/main/java/com/example/switching/webhook/crypto/**'
      - 'src/test/java/com/example/switching/webhook/crypto/**'
      - 'src/test/java/com/example/switching/operations/service/OperationsGenerateRoutesForBankIntegrationTest.java'
      - 'src/main/java/com/example/switching/crossborder/**'
      - 'scripts/phase69/**'
      - 'scripts/verify_phase69_static.py'
      - 'scripts/execute-and-verify/**'
      - 'config/phase69/**'
      - 'schemas/phase69/**'
      - '.github/workflows/phase69-verification-closure.yml'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  static-and-regression:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: maven
      - uses: actions/setup-python@v5
        with:
          python-version: '3.13'
      - name: Install verifier dependencies
        run: python -m pip install --disable-pip-version-check --no-cache-dir PyYAML==6.0.2
      - name: Phase 69 static contract
        run: python3 scripts/verify_phase69_static.py
      - name: Phase 69 preflight
        run: scripts/phase69/run_phase69.sh --preflight
      - name: Targeted P0 regression tests
        run: ./mvnw -B -Dtest=WebhookEncryptionConfigurationTest,OperationsGenerateRoutesForBankIntegrationTest test
      - name: Maven clean verify
        run: ./mvnw -B clean verify
      - name: Upload Phase 69 evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: phase69-verification-${{ github.sha }}
          path: |
            evidence/phase69/
            target/surefire-reports/
            target/failsafe-reports/
          if-no-files-found: warn
          retention-days: 90
