name: Phase II Static Contract

on:
  pull_request:
    paths:
      - 'phase-ii/**'
      - 'src/main/java/com/example/switching/rtp/**'
      - 'src/main/resources/db/migration/V91__request_to_pay_foundation.sql'
      - 'src/main/resources/application.yml'
      - 'scripts/verify_phase_ii_01_04_static.py'
      - '.github/workflows/phase-ii-static-contract.yml'
  push:
    branches: [ main ]

permissions:
  contents: read

jobs:
  phase-ii-contract:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Verify Phase II-01 through II-04
        run: python3 scripts/verify_phase_ii_01_04_static.py
      - name: Verify shell syntax
        run: bash -n scripts/curl_rtp_tests.sh

  rtp-tests:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: maven
      - name: Run RTP unit, controller and integration tests
        run: ./mvnw -B -Dtest=RtpStateMachineTest,RtpRequestFingerprintTest,RequestToPayControllerTest,RtpRequestIntegrationTest test
