name: Phase 71 UAT Certification
on:
  workflow_dispatch:
    inputs:
      mode:
        description: Repository-safe certification mode
        required: true
        default: repo
        type: choice
        options: [preflight, repo]
  pull_request:
    paths:
      - 'scripts/phase71/**'
      - 'config/phase71-*.yaml'
      - 'schemas/phase71-*.json'
      - 'sql/phase71/**'
      - 'src/main/java/com/example/switching/jdbc/**'
      - 'src/main/java/com/example/switching/crossborder/service/CrossBorderTransferService.java'
      - 'src/test/java/com/example/switching/jdbc/**'
permissions:
  contents: read
jobs:
  phase71:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: maven
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install verifier dependencies
        run: python -m pip install --disable-pip-version-check PyYAML
      - name: Static contract
        run: python3 scripts/verify_phase71_static.py
      - name: Execute repository-safe gate
        env:
          PHASE71_MODE: ${{ inputs.mode || 'preflight' }}
        run: |
          if [[ "${PHASE71_MODE}" == "repo" ]]; then
            scripts/phase71/run_phase71.sh --repo
          else
            scripts/phase71/run_phase71.sh --preflight
          fi
      - name: Compile temporal binder tests
        if: ${{ inputs.mode == 'repo' }}
        run: ./mvnw -B -DskipTests compile
      - name: Upload evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: phase71-evidence
          path: scripts/phase71/evidence/
          if-no-files-found: warn
