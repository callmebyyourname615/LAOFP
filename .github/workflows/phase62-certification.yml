name: Phase 62 Certification

on:
  pull_request:
    paths:
      - 'src/**'
      - 'scripts/phase62/**'
      - 'scripts/verify_phase62_static.py'
      - 'monitoring/**'
      - 'docs/**'
      - 'pom.xml'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  static-contract:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: pip install --disable-pip-version-check PyYAML==6.0.2
      - name: Verify strict Phase 62 contract
        run: python3 scripts/verify_phase62_static.py --json-output phase62-static.json
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: phase62-static-contract
          path: phase62-static.json
          if-no-files-found: error
          retention-days: 30

  build-and-test:
    runs-on: ubuntu-24.04
    needs: static-contract
    services:
      postgres:
        image: postgres:16.9-alpine
        env:
          POSTGRES_USER: switching
          POSTGRES_PASSWORD: phase62-ci-only-password
          POSTGRES_DB: switching_db
        ports: ['5432:5432']
        options: >-
          --health-cmd "pg_isready -U switching -d switching_db"
          --health-interval 10s --health-timeout 5s --health-retries 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: maven
      - name: Maven verify
        run: ./mvnw -B clean verify
      - name: Certify fresh test reports
        run: python3 scripts/phase62/certify_test_reports.py --reports target --output target/phase62-test-summary.json
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: phase62-test-evidence
          path: |
            target/surefire-reports
            target/failsafe-reports
            target/phase62-test-summary.json
          if-no-files-found: warn
          retention-days: 30
