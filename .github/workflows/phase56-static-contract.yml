name: Phase 56 Static Contract
on:
  pull_request:
  push:
    branches: [main]
permissions:
  contents: read
jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: {python-version: '3.12'}
      - run: pip install pyyaml
      - run: python3 scripts/verify_phase56_static.py
      - run: python3 -m unittest -v scripts.day2.tests.test_phase56_framework
