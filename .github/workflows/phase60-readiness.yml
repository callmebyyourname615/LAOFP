name: Phase 60 readiness gates

on:
  pull_request:
    paths:
      - 'src/**'
      - 'scripts/**'
      - 'security/**'
      - 'performance/**'
      - 'backup/**'
      - 'dr/**'
      - 'monitoring/**'
      - 'schemas/**'
      - 'pom.xml'
      - '.github/workflows/phase60-readiness.yml'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  certify-repository:
    runs-on: ubuntu-latest
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: maven
      - uses: actions/setup-python@v5
        with:
          python-version: '3.13'
      - name: Install static verifier dependencies
        run: python -m pip install --disable-pip-version-check --no-cache-dir PyYAML==6.0.2
      - name: Phase 60 static contract
        run: python3 scripts/verify_phase60_static.py
      - name: Repository baseline
        env:
          PHASE60_RUN_ID: ci-${{ github.run_id }}-${{ github.run_attempt }}
          PHASE60_EVIDENCE_ROOT: build/phase60-evidence
        run: scripts/phase60/60A-repository-baseline.sh
      - name: Full build and test closure
        run: ./mvnw -B clean verify
      - name: Summarize test reports
        if: always()
        run: |
          mkdir -p build/phase60-evidence/test-summary
          python3 scripts/phase60/summarize_test_reports.py \
            --root . --output build/phase60-evidence/test-summary/tests.json
      - name: Upload Phase 60 CI evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: phase60-ci-evidence-${{ github.sha }}
          path: |
            build/phase60-evidence/
            target/surefire-reports/
            target/failsafe-reports/
          if-no-files-found: warn
          retention-days: 90
