name: Phase II 05-24 Contract
on:
  pull_request:
    paths:
      - 'src/**'
      - 'scripts/verify_phase_ii_05_24_static.py'
      - '.github/workflows/phase-ii-05-24-contract.yml'
  workflow_dispatch:
permissions:
  contents: read
jobs:
  static-contract:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: '3.12' }
      - run: python3 scripts/verify_phase_ii_05_24_static.py
  java-verification:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16.9-alpine
        env:
          POSTGRES_DB: switching_test
          POSTGRES_USER: switching_test
          POSTGRES_PASSWORD: test-only-switching
        ports: ['5432:5432']
        options: >-
          --health-cmd "pg_isready -U switching_test"
          --health-interval 10s --health-timeout 5s --health-retries 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with: { distribution: temurin, java-version: '21', cache: maven }
      - run: ./mvnw -B -Dtest='com.example.switching.phaseii.*,com.example.switching.rtp.*' verify
