name: Phase 74 UAT Runtime Certification
on:
  workflow_dispatch:
    inputs:
      mode: {description: Execution mode, required: true, default: preflight, type: choice, options: [preflight, repo]}
permissions: {contents: read}
jobs:
  certify:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: {python-version: '3.12'}
      - name: Install validation dependencies
        run: python -m pip install --disable-pip-version-check pyyaml
      - name: Static contract
        run: python3 scripts/verify_phase74_75_static.py
      - name: Phase 74 preflight
        run: scripts/phase74/run_phase74.sh --${{ inputs.mode }}
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: phase74-preflight-${{ github.sha }}
          path: scripts/phase74/evidence/
          if-no-files-found: error
