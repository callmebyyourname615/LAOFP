name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: [main, develop]

permissions:
  contents: read
  security-events: write
  pull-requests: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Full Maven Test Suite
    runs-on: ubuntu-latest
    timeout-minutes: 60
    env:
      SPRING_PROFILES_ACTIVE: test
      MESSAGE_CRYPTO_KEY_BASE64: NImwCmFwkSIeDgy8UJtzGq86A389puEEe6gi2Wdo9MM=
      TEST_WEBHOOK_MASTER_KEY_BASE64: NImwCmFwkSIeDgy8UJtzGq86A389puEEe6gi2Wdo9MM=
      TESTCONTAINERS_RYUK_DISABLED: "false"
    steps:
      - name: Check out source
        uses: actions/checkout@v6

      - name: Set up Java 21
        uses: actions/setup-java@v5
        with:
          java-version: "21"
          distribution: temurin
          cache: maven

      - name: Install static validator dependencies
        run: pip install --disable-pip-version-check PyYAML==6.0.2

      - name: Verify all production readiness repository invariants
        run: python3 scripts/verify_all_static.py

      - name: Run every unit and integration test
        run: |
          chmod +x mvnw
          ./mvnw --batch-mode --no-transfer-progress test

      - name: Upload complete Surefire reports
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: surefire-reports-${{ github.sha }}
          path: |
            target/surefire-reports/
          if-no-files-found: warn
          retention-days: 30


  security-gates:
    name: Security Gates
    uses: ./.github/workflows/security.yml
    secrets: inherit
    with:
      dependency_review_enabled: ${{ github.event_name == 'pull_request' }}
    permissions:
      contents: read
      security-events: write
      pull-requests: read

  package:
    name: Package Executable JAR
    runs-on: ubuntu-latest
    needs: [test, security-gates]
    timeout-minutes: 20
    steps:
      - name: Check out source
        uses: actions/checkout@v6

      - name: Set up Java 21
        uses: actions/setup-java@v5
        with:
          java-version: "21"
          distribution: temurin
          cache: maven

      - name: Package with immutable build metadata
        run: |
          chmod +x mvnw
          ./mvnw --batch-mode --no-transfer-progress package -DskipTests \
            -Dbuild.commit="${GITHUB_SHA}" \
            -Dbuild.image="ghcr.io/${GITHUB_REPOSITORY,,}/switching-api:${GITHUB_SHA}"

      - name: Upload executable JAR
        uses: actions/upload-artifact@v7
        with:
          name: switching-api-jar-${{ github.sha }}
          path: target/*.jar
          if-no-files-found: error
          retention-days: 7
