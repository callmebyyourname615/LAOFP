apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: switching-phase62-database-pool
  namespace: monitoring
spec:
  groups:
    - name: switching-phase62-hikaricp
      rules:
        - record: switching:hikaricp_utilization:ratio
          expr: |
            hikaricp_connections_active
            /
            clamp_min(hikaricp_connections_max, 1)
        - alert: SwitchingHikariPoolUtilizationHigh
          expr: switching:hikaricp_utilization:ratio > 0.80
          for: 10m
          labels:
            severity: warning
            phase: 62F
          annotations:
            summary: Database connection pool utilization is above 80 percent
            description: Hikari pool {{ $labels.pool }} has remained above 80 percent utilization for 10 minutes.
            runbook_url: docs/runbooks/HIKARI_POOL_SATURATION.md
        - alert: SwitchingHikariPoolThreadsPending
          expr: hikaricp_connections_pending > 0
          for: 2m
          labels:
            severity: critical
            phase: 62F
          annotations:
            summary: Requests are waiting for database connections
            description: Hikari pool {{ $labels.pool }} has pending acquisition threads for more than two minutes.
            runbook_url: docs/runbooks/HIKARI_POOL_SATURATION.md
        - alert: SwitchingHikariAcquireLatencyHigh
          expr: |
            histogram_quantile(0.95,
              sum by (le, pool) (rate(hikaricp_connections_acquire_seconds_bucket[5m]))) > 0.1
          for: 5m
          labels:
            severity: warning
            phase: 62F
          annotations:
            summary: Database connection acquisition P95 exceeds 100 milliseconds
            description: Hikari pool {{ $labels.pool }} is taking longer than the approved acquisition latency budget.
            runbook_url: docs/runbooks/HIKARI_POOL_SATURATION.md
        - alert: SwitchingReadReplicaPoolUnavailable
          expr: |
            max by (pool) (hikaricp_connections_max{pool="SwitchingReadReplicaPool"}) < 1
          for: 2m
          labels:
            severity: critical
            phase: 62F
          annotations:
            summary: Read-replica Hikari pool is unavailable
            description: The configured read-replica pool is not exposing a usable maximum connection count.
            runbook_url: docs/runbooks/HIKARI_POOL_SATURATION.md
