apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: switching-phase33-42-controls
  namespace: monitoring
  labels:
    release: prometheus
spec:
  groups:
  - name: switching-financial-controls
    rules:
    - alert: SwitchingLiquidityHeadroomLow
      expr: switching_liquidity_breaches_open > 0
      for: 2m
      labels:
        severity: critical
      annotations:
        summary: Participant liquidity headroom below minimum
        description: Participant liquidity headroom is below the approved minimum.
        runbook_url: docs/runbooks/INTRADAY_LIQUIDITY.md
    - alert: SwitchingGovernedFxRateMissing
      expr: switching_fx_pairs_without_valid_rate > 0
      for: 2m
      labels:
        severity: critical
      annotations:
        summary: No valid governed FX rate
        description: At least one enabled currency pair has no valid approved FX rate.
        runbook_url: docs/runbooks/FX_RATE_GOVERNANCE.md
    - alert: SwitchingCertificateExpiringSoon
      expr: switching_participant_certificates_expiring_30d > 0
      for: 15m
      labels:
        severity: warning
      annotations:
        summary: Participant certificate expires within 30 days
        description: A participant certificate expires within 30 days and requires coordinated rotation.
        runbook_url: docs/runbooks/CERTIFICATE_LIFECYCLE.md
    - alert: SwitchingSyntheticProbeFailed
      expr: switching_synthetic_failures_last10m > 0
      for: 1m
      labels:
        severity: critical
      annotations:
        summary: Synthetic payment probe failed
        description: The controlled synthetic payment path failed within the last ten minutes.
        runbook_url: docs/runbooks/SYNTHETIC_MONITORING.md
    - alert: SwitchingCorrectiveActionOverdue
      expr: switching_incident_actions_overdue > 0
      for: 30m
      labels:
        severity: warning
      annotations:
        summary: Incident corrective action is overdue
        description: An incident corrective action has passed its committed due date.
        runbook_url: docs/runbooks/INCIDENT_CAPA.md
    - alert: SwitchingRegulatoryReportOverdue
      expr: switching_regulatory_reports_overdue > 0
      for: 15m
      labels:
        severity: critical
      annotations:
        summary: Regulatory report submission overdue
        description: A required regulatory report has missed its submission deadline.
        runbook_url: docs/runbooks/REGULATORY_REPORTING.md
    - alert: SwitchingNotificationDeadLetterGrowing
      expr: switching_notifications_dead_last30m > 10
      for: 10m
      labels:
        severity: warning
      annotations:
        summary: Notification dead-letter volume increasing
        description: Notification dead-letter volume exceeds the approved rolling threshold.
        runbook_url: docs/runbooks/NOTIFICATION_DELIVERY.md
