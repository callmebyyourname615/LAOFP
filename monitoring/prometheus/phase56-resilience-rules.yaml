apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: phase56-resilience-rules
  namespace: monitoring
spec:
  groups:
    - name: switching-phase56-resilience
      rules:
        - alert: SwitchingResilienceCertificateExpired
          expr: switching_resilience_certificate_valid_until_timestamp_seconds < time()
          for: 5m
          labels: {severity: critical, phase: 56J}
          annotations: {summary: Resilience certificate expired, description: The current resilience certification has expired and failure recovery must be re-certified., runbook_url: docs/runbooks/PHASE56_DAY2_OPERATIONS.md}
        - alert: SwitchingBackupRestoreCertificationStale
          expr: switching_restore_drill_last_success_timestamp_seconds < time() - 2678400
          for: 1h
          labels: {severity: warning, phase: 56J}
          annotations: {summary: Restore certification older than 31 days, description: No successful restore drill has been recorded within the required 31-day certification interval., runbook_url: docs/runbooks/RB-12_BACKUP_PITR_AND_RESTORE.md}
