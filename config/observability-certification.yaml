schemaVersion: 1
healthEndpoints:
  - /actuator/health
  - /actuator/health/liveness
  - /actuator/health/readiness
metricsEndpoint: /actuator/prometheus
requiredHealthComponents: [db, diskSpace, ping]
minimumAlertRuleCount: 47
requiredMetricFamilies:
  - switching_transaction_success_rate
  - switching_outbox_backlog
  - switching_settlement_cycle_duration_seconds
  - switching_sanctions_freshness_seconds
  - switching_webhook_permanent_failures_total
dashboards:
  - monitoring/grafana/dashboards/switching-api.json
  - monitoring/grafana/dashboards/switching-transactions.json
  - monitoring/grafana/dashboards/switching-settlement.json
  - monitoring/grafana/dashboards/switching-aml.json
alertRuleGlobs:
  - monitoring/prometheus/*.yaml
