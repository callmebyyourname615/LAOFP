apiVersion: chaos-mesh.org/v1alpha1
kind: NetworkChaos
metadata:
  name: phase73-kafka-delay-${PHASE73_RUN_ID_SAFE}
  namespace: ${PHASE73_NAMESPACE}
  labels:
    switching.phase: "73D"
    switching.run-id: "${PHASE73_RUN_ID_SAFE}"
spec:
  action: delay
  mode: all
  selector:
    namespaces:
      - ${PHASE73_NAMESPACE}
    labelSelectors:
      app.kubernetes.io/name: ${PHASE73_APP_LABEL}
  direction: to
  externalTargets: ${PHASE73_KAFKA_CIDRS_JSON}
  delay:
    latency: "500ms"
    correlation: "100"
    jitter: "100ms"
  duration: "${PHASE73_EXPERIMENT_DURATION}s"
