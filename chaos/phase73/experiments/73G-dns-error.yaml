apiVersion: chaos-mesh.org/v1alpha1
kind: DNSChaos
metadata:
  name: phase73-dns-error-${PHASE73_RUN_ID_SAFE}
  namespace: ${PHASE73_NAMESPACE}
  labels:
    switching.phase: "73G"
    switching.run-id: "${PHASE73_RUN_ID_SAFE}"
spec:
  action: error
  mode: all
  patterns: ${PHASE73_DNS_PATTERNS_JSON}
  selector:
    namespaces:
      - ${PHASE73_NAMESPACE}
    labelSelectors:
      app.kubernetes.io/name: ${PHASE73_APP_LABEL}
  duration: "${PHASE73_EXPERIMENT_DURATION}s"
