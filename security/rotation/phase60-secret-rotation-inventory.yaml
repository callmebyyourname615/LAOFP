schemaVersion: 1
credentials:
  - id: POSTGRES_PASSWORD
    ownerRole: SecOps
    vaultPath: secret/switching/prod/postgres
    vaultProperty: superuser_password
    consumers: [postgres-primary, postgres-replica-bootstrap]
  - id: REPLICATION_PASSWORD
    ownerRole: DatabaseSRE
    vaultPath: secret/switching/prod/postgres
    vaultProperty: replication_password
    consumers: [postgres-primary, postgres-replica]
  - id: DB_APP_PASSWORD
    ownerRole: DatabaseSRE
    vaultPath: secret/switching/prod/application
    vaultProperty: database_password
    consumers: [switching-application]
  - id: FLYWAY_PASSWORD
    ownerRole: DatabaseSRE
    vaultPath: secret/switching/prod/migration
    vaultProperty: database_password
    consumers: [switching-migration-job]
  - id: ARCHIVE_POSTGRES_PASSWORD
    ownerRole: DatabaseSRE
    vaultPath: secret/switching/prod/archive
    vaultProperty: database_password
    consumers: [archive-writer, archive-reader]
  - id: MINIO_ROOT_PASSWORD
    ownerRole: StorageSRE
    vaultPath: secret/switching/prod/object-storage
    vaultProperty: root_password
    consumers: [minio-production]
policy:
  minimumLength: 32
  generatedByApprovedCsprng: true
  dualControlRequired: true
  oldCredentialMustBeDisabled: true
  evidenceRetentionDays: 2555
