apiVersion: v1
kind: Service
metadata:
  name: switching-api
  namespace: switching
  labels:
    app: switching-api
spec:
  type: ClusterIP
  selector:
    app: switching-api
  ports:
    - name: http
      port: 80
      targetPort: 8080
      protocol: TCP
    - name: management
      port: 9090
      targetPort: 9090
      protocol: TCP
---
# Internal management service — only reachable within the cluster (Prometheus scraping)
apiVersion: v1
kind: Service
metadata:
  name: switching-api-management
  namespace: switching
  labels:
    app: switching-api
    monitoring: enabled
spec:
  type: ClusterIP
  selector:
    app: switching-api
  ports:
    - name: management
      port: 9090
      targetPort: 9090
      protocol: TCP
