apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: switching-break-glass-observer
  namespace: switching
  annotations:
    switching.example.com/access-policy: time-bound-external-identity-only
rules:
  - apiGroups: [""]
    resources: ["pods", "pods/log", "events", "services", "endpoints", "configmaps"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["apps"]
    resources: ["deployments", "replicasets"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["batch"]
    resources: ["jobs"]
    verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: switching-break-glass-observer
  namespace: switching
  annotations:
    switching.example.com/requires-expiring-idp-membership: "true"
subjects:
  - kind: Group
    name: switching-production-break-glass
    apiGroup: rbac.authorization.k8s.io
roleRef:
  kind: Role
  name: switching-break-glass-observer
  apiGroup: rbac.authorization.k8s.io
