apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: switching-production-ingress
  namespace: switching
spec:
  podSelector:
    matchLabels:
      app: switching-api
  policyTypes: [Ingress]
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: ingress-nginx
      ports:
        - {protocol: TCP, port: 8080}
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: monitoring
      ports:
        - {protocol: TCP, port: 9090}
