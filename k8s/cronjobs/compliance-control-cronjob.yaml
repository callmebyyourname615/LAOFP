apiVersion: batch/v1
kind: CronJob
metadata:
  name: switching-compliance-control
spec:
  schedule: "0 2 * * *"
  concurrencyPolicy: Forbid
  jobTemplate:
    spec:
      template:
        spec:
          restartPolicy: Never
          containers:
            - name: compliance
              image: ghcr.io/example/switching-ops@sha256:REPLACE_WITH_DIGEST
              command: ["/workspace/scripts/compliance/run_control_pack.sh"]
              envFrom:
                - secretRef:
                    name: switching-readonly-db-secret
