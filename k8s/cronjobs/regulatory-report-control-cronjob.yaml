apiVersion: batch/v1
kind: CronJob
metadata:
  name: switching-regulatory-report-control
  labels:
    app.kubernetes.io/name: switching
    switching.io/control-phase: "38"
spec:
  schedule: "15 2 * * *"
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 7
  failedJobsHistoryLimit: 14
  jobTemplate:
    spec:
      backoffLimit: 1
      activeDeadlineSeconds: 900
      template:
        spec:
          restartPolicy: Never
          serviceAccountName: switching-ops
          securityContext:
            runAsNonRoot: true
            seccompProfile: {type: RuntimeDefault}
          containers:
            - name: regulatory-control
              image: ghcr.io/example/switching-ops@sha256:REPLACE_WITH_DIGEST
              command: ["/workspace/scripts/regulatory/check_report_deadlines.sh"]
              envFrom:
                - secretRef: {name: switching-ops-db-secret}
              resources:
                requests: {cpu: 25m, memory: 64Mi}
                limits: {cpu: 250m, memory: 256Mi}
              securityContext:
                allowPrivilegeEscalation: false
                readOnlyRootFilesystem: true
                capabilities: {drop: ["ALL"]}
