apiVersion: batch/v1
kind: CronJob
metadata:
  name: switching-crypto-inventory-control
  labels: {app.kubernetes.io/name: switching, switching.io/control-phase: "43-52"}
spec:
  schedule: "15 1 * * *"
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 7
  jobTemplate:
    spec:
      backoffLimit: 1
      activeDeadlineSeconds: 900
      template:
        metadata: {labels: {app.kubernetes.io/name: switching-control}}
        spec:
          restartPolicy: Never
          serviceAccountName: switching-ops
          securityContext: {runAsNonRoot: true, seccompProfile: {type: RuntimeDefault}}
          containers:
            - name: control
              image: ghcr.io/example/switching-ops@sha256:REPLACE_WITH_DIGEST
              command: ["/workspace/scripts/crypto/check_crypto_inventory.sh"]
              env:
                - {name: CRYPTO_ROTATION_WARNING_DAYS, valueFrom: {configMapKeyRef: {name: switching-phase43-52-control-policy, key: crypto-rotation-warning-days}}}
              envFrom: [{secretRef: {name: switching-ops-db-secret}}]
              resources: {requests: {cpu: 25m, memory: 64Mi}, limits: {cpu: 250m, memory: 256Mi}}
              securityContext: {allowPrivilegeEscalation: false, readOnlyRootFilesystem: true, capabilities: {drop: ["ALL"]}}
---
