apiVersion: batch/v1
kind: CronJob
metadata:
  name: switching-third-party-dependency-probe
  labels: {app.kubernetes.io/name: switching, switching.io/control-phase: "43-52"}
spec:
  schedule: "*/2 * * * *"
  suspend: true
  concurrencyPolicy: Forbid
  jobTemplate:
    spec:
      backoffLimit: 1
      activeDeadlineSeconds: 120
      template:
        metadata: {labels: {app.kubernetes.io/name: switching-control}}
        spec:
          restartPolicy: Never
          serviceAccountName: switching-ops
          securityContext: {runAsNonRoot: true, seccompProfile: {type: RuntimeDefault}}
          containers:
            - name: probe
              image: ghcr.io/example/switching-ops@sha256:REPLACE_WITH_DIGEST
              command: ["python3","/workspace/scripts/dependencies/probe_dependencies.py","/config/dependencies.yaml","/tmp/results.json"]
              volumeMounts: [{name: config, mountPath: /config, readOnly: true}]
              resources: {requests: {cpu: 25m, memory: 64Mi}, limits: {cpu: 250m, memory: 256Mi}}
              securityContext: {allowPrivilegeEscalation: false, readOnlyRootFilesystem: true, capabilities: {drop: ["ALL"]}}
          volumes: [{name: config, configMap: {name: switching-third-party-probe-config}}]
