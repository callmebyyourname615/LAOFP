apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: switching-api-canary
  namespace: switching
  labels:
    app: switching-api-canary
    switching.example.com/policy-template: deny-only
spec:
  podSelector:
    matchLabels:
      app: switching-api-canary
      track: canary
  policyTypes: [Ingress, Egress]
  # Intentionally no allow rules. Phase 55G renders and applies the production
  # CIDR allowlist for this same object name before canary replicas receive traffic.
  ingress: []
  egress: []
