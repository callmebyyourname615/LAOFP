apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: switching-api-canary
  namespace: monitoring
  labels:
    release: prometheus
spec:
  namespaceSelector:
    matchNames: [switching]
  selector:
    matchLabels:
      app: switching-api-canary
      monitoring: enabled
  endpoints:
    - port: management
      path: /actuator/prometheus
      interval: 30s
      scrapeTimeout: 10s
      relabelings:
        - action: replace
          targetLabel: application
          replacement: switching-api
        - action: replace
          targetLabel: release_track
          replacement: canary
