apiVersion: batch/v1
kind: CronJob
metadata:
  name: switching-backup-retention
  namespace: switching
spec:
  schedule: "30 2 * * 0"
  timeZone: "Asia/Vientiane"
  concurrencyPolicy: Forbid
  jobTemplate:
    spec:
      backoffLimit: 1
      ttlSecondsAfterFinished: 604800
      template:
        metadata:
          labels:
            app.kubernetes.io/name: switching-backup
            app.kubernetes.io/component: retention
        spec:
          serviceAccountName: switching-backup
          automountServiceAccountToken: false
          restartPolicy: Never
          containers:
            - name: retention
              image: ghcr.io/REPLACE_WITH_GITHUB_REPOSITORY/switching-backup@sha256:REPLACE_WITH_BACKUP_IMAGE_DIGEST
              command: ["/opt/switching-backup/bin/apply-retention.sh"]
              envFrom:
                - configMapRef: { name: switching-backup-config }
                - secretRef: { name: switching-backup-secrets }
              securityContext:
                allowPrivilegeEscalation: false
                readOnlyRootFilesystem: true
                capabilities: { drop: ["ALL"] }
              volumeMounts:
                - { name: tmp, mountPath: /tmp }
          volumes:
            - name: tmp
              emptyDir: { sizeLimit: "64Mi" }
---
apiVersion: batch/v1
kind: CronJob
metadata:
  name: switching-backup-replication-check
  namespace: switching
spec:
  schedule: "45 2 * * *"
  timeZone: "Asia/Vientiane"
  concurrencyPolicy: Forbid
  jobTemplate:
    spec:
      backoffLimit: 1
      ttlSecondsAfterFinished: 604800
      template:
        metadata:
          labels:
            app.kubernetes.io/name: switching-backup
            app.kubernetes.io/component: replication-check
        spec:
          serviceAccountName: switching-backup
          automountServiceAccountToken: false
          restartPolicy: Never
          containers:
            - name: verify
              image: ghcr.io/REPLACE_WITH_GITHUB_REPOSITORY/switching-backup@sha256:REPLACE_WITH_BACKUP_IMAGE_DIGEST
              command: ["/opt/switching-backup/bin/verify-replication.sh"]
              envFrom:
                - configMapRef: { name: switching-backup-config }
                - secretRef: { name: switching-backup-secrets }
              securityContext:
                allowPrivilegeEscalation: false
                readOnlyRootFilesystem: true
                capabilities: { drop: ["ALL"] }
              volumeMounts:
                - { name: work, mountPath: /var/lib/switching-backup/work }
                - { name: metrics, mountPath: /var/lib/switching-backup/metrics }
                - { name: tmp, mountPath: /tmp }
          volumes:
            - name: work
              emptyDir: { sizeLimit: "128Mi" }
            - name: metrics
              emptyDir: { sizeLimit: "16Mi" }
            - name: tmp
              emptyDir: { sizeLimit: "64Mi" }
