apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: switching-wal-spool
  namespace: switching
  labels:
    app.kubernetes.io/name: switching-backup
    app.kubernetes.io/component: wal-archive
spec:
  accessModes: ["ReadWriteOnce"]
  storageClassName: REPLACE_WITH_WAL_SPOOL_STORAGE_CLASS
  resources:
    requests:
      storage: 50Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: switching-wal-archiver
  namespace: switching
  labels:
    app.kubernetes.io/name: switching-backup
    app.kubernetes.io/component: wal-archive
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app.kubernetes.io/name: switching-backup
      app.kubernetes.io/component: wal-archive
  template:
    metadata:
      labels:
        app.kubernetes.io/name: switching-backup
        app.kubernetes.io/component: wal-archive
    spec:
      serviceAccountName: switching-backup
      automountServiceAccountToken: false
      terminationGracePeriodSeconds: 60
      securityContext:
        runAsNonRoot: true
        runAsUser: 999
        runAsGroup: 999
        fsGroup: 999
        seccompProfile: { type: RuntimeDefault }
      containers:
        - name: wal-archiver
          image: ghcr.io/REPLACE_WITH_GITHUB_REPOSITORY/switching-backup@sha256:REPLACE_WITH_BACKUP_IMAGE_DIGEST
          imagePullPolicy: IfNotPresent
          command: ["/opt/switching-backup/bin/wal-receiver.sh"]
          envFrom:
            - configMapRef: { name: switching-backup-config }
            - secretRef: { name: switching-backup-secrets }
          resources:
            requests: { cpu: "250m", memory: "256Mi" }
            limits: { cpu: "1", memory: "1Gi" }
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities: { drop: ["ALL"] }
          startupProbe:
            exec:
              command: ["/bin/bash", "-ec", "pgrep -f '[p]g_receivewal' >/dev/null"]
            periodSeconds: 5
            failureThreshold: 24
          livenessProbe:
            exec:
              command: ["/bin/bash", "-ec", "pgrep -f '[p]g_receivewal' >/dev/null && pgrep -f '[w]al-uploader.sh' >/dev/null"]
            periodSeconds: 30
            failureThreshold: 3
          volumeMounts:
            - { name: trust-bundle, mountPath: /var/run/secrets/trust, readOnly: true }
            - { name: spool, mountPath: /var/lib/switching-backup/incoming }
            - { name: work, mountPath: /var/lib/switching-backup/work }
            - { name: metrics, mountPath: /var/lib/switching-backup/metrics }
            - { name: tmp, mountPath: /tmp }
      volumes:
        - name: trust-bundle
          secret:
            secretName: switching-trust-bundle
            defaultMode: 0440
        - name: spool
          persistentVolumeClaim:
            claimName: switching-wal-spool
        - name: work
          emptyDir: { sizeLimit: "1Gi" }
        - name: metrics
          emptyDir: { sizeLimit: "16Mi" }
        - name: tmp
          emptyDir: { sizeLimit: "1Gi" }
---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: switching-wal-archiver
  namespace: switching
spec:
  minAvailable: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: switching-backup
      app.kubernetes.io/component: wal-archive
