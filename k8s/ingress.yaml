apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: switching-api
  namespace: switching
  labels:
    app: switching-api
  annotations:
    nginx.ingress.kubernetes.io/backend-protocol: "HTTP"
    nginx.ingress.kubernetes.io/auth-tls-secret: "switching/switching-client-ca"
    nginx.ingress.kubernetes.io/auth-tls-verify-client: "on"
    nginx.ingress.kubernetes.io/auth-tls-verify-depth: "3"
    nginx.ingress.kubernetes.io/auth-tls-pass-certificate-to-upstream: "true"
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    nginx.ingress.kubernetes.io/proxy-body-size: "1m"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "30"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "30"
spec:
  ingressClassName: nginx
  tls:
    - hosts:
        # Template host. Replace with the real production API hostname.
        - switching.example.com
      secretName: switching-api-tls
  rules:
    - host: switching.example.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: switching-api
                port:
                  name: http
