apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: switching-migration-secrets
  namespace: switching
  labels:
    app.kubernetes.io/name: switching-api
    app.kubernetes.io/component: database-migration
spec:
  refreshPolicy: Periodic
  refreshInterval: 5m
  secretStoreRef:
    name: switching-vault
    kind: SecretStore
  target:
    name: switching-flyway-secrets
    creationPolicy: Orphan
    deletionPolicy: Retain
    template:
      type: Opaque
      metadata:
        labels:
          app.kubernetes.io/name: switching-api
          app.kubernetes.io/managed-by: external-secrets
  data:
    - secretKey: FLYWAY_URL
      remoteRef: { key: switching/prod/migration, property: FLYWAY_URL }
    - secretKey: FLYWAY_USERNAME
      remoteRef: { key: switching/prod/migration, property: FLYWAY_USERNAME }
    - secretKey: FLYWAY_PASSWORD
      remoteRef: { key: switching/prod/migration, property: FLYWAY_PASSWORD }
