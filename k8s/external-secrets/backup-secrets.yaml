apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: switching-backup-secrets
  namespace: switching
  labels:
    app.kubernetes.io/name: switching-backup
    app.kubernetes.io/component: backup
spec:
  refreshPolicy: Periodic
  refreshInterval: 5m
  secretStoreRef:
    name: switching-vault
    kind: SecretStore
  target:
    name: switching-backup-secrets
    creationPolicy: Orphan
    deletionPolicy: Retain
    template:
      type: Opaque
      metadata:
        labels:
          app.kubernetes.io/name: switching-backup
          app.kubernetes.io/managed-by: external-secrets
  data:
    - secretKey: PGUSER
      remoteRef: { key: switching/prod/backup, property: PGUSER }
    - secretKey: PGPASSWORD
      remoteRef: { key: switching/prod/backup, property: PGPASSWORD }
    - secretKey: AWS_ACCESS_KEY_ID
      remoteRef: { key: switching/prod/backup, property: AWS_ACCESS_KEY_ID }
    - secretKey: AWS_SECRET_ACCESS_KEY
      remoteRef: { key: switching/prod/backup, property: AWS_SECRET_ACCESS_KEY }
    - secretKey: BACKUP_AGE_RECIPIENT
      remoteRef: { key: switching/prod/backup, property: BACKUP_AGE_RECIPIENT }
    - secretKey: SECONDARY_AWS_ACCESS_KEY_ID
      remoteRef: { key: switching/prod/backup, property: SECONDARY_AWS_ACCESS_KEY_ID }
    - secretKey: SECONDARY_AWS_SECRET_ACCESS_KEY
      remoteRef: { key: switching/prod/backup, property: SECONDARY_AWS_SECRET_ACCESS_KEY }
---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: switching-restore-secrets
  namespace: switching
  labels:
    app.kubernetes.io/name: switching-backup
    app.kubernetes.io/component: restore
spec:
  refreshPolicy: Periodic
  refreshInterval: 5m
  secretStoreRef:
    name: switching-vault
    kind: SecretStore
  target:
    name: switching-restore-secrets
    creationPolicy: Orphan
    deletionPolicy: Retain
    template:
      type: Opaque
      metadata:
        labels:
          app.kubernetes.io/name: switching-backup
          app.kubernetes.io/managed-by: external-secrets
  data:
    - secretKey: age-identity.txt
      remoteRef: { key: switching/prod/restore, property: BACKUP_AGE_IDENTITY }
