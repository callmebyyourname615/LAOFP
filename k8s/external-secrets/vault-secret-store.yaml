apiVersion: v1
kind: ServiceAccount
metadata:
  name: switching-vault-auth
  namespace: switching
  labels:
    app.kubernetes.io/name: switching-api
    app.kubernetes.io/component: external-secrets-auth
automountServiceAccountToken: false
---
apiVersion: external-secrets.io/v1
kind: SecretStore
metadata:
  name: switching-vault
  namespace: switching
  labels:
    app.kubernetes.io/name: switching-api
spec:
  provider:
    vault:
      server: "https://REPLACE_WITH_VAULT_HOST:8200"
      path: "kv"
      version: "v2"
      auth:
        kubernetes:
          mountPath: "kubernetes/REPLACE_WITH_CLUSTER_NAME"
          role: "switching-external-secrets"
          serviceAccountRef:
            name: switching-vault-auth
            audiences:
              - vault
