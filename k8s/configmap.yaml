apiVersion: v1
kind: ConfigMap
metadata:
  name: switching-config
  namespace: switching
data:
  # Template values only. Replace all REPLACE_WITH_* entries before applying.
  SPRING_PROFILES_ACTIVE: "prod"
  SERVER_PORT: "8080"
  MANAGEMENT_PORT: "9090"
  OBSERVABILITY_ENVIRONMENT: "production"
  OPERATIONAL_METRICS_REFRESH: "PT30S"
  OUTBOX_POLL_INTERVAL_MS: "30000"
  OUTBOX_RECOVERY_INTERVAL_MS: "60000"
  OUTBOX_BATCH_SIZE: "20"
  OUTBOX_MAX_RETRY: "3"
  OUTBOX_STUCK_TIMEOUT_MINUTES: "2"
  RATE_LIMIT_RPM: "60"
  JSON_INITIATION_ENABLED: "false"
  SECURITY_OAUTH_ENABLED: "true"
  SECURITY_MTLS_ENABLED: "true"
  SECURITY_SIGNING_ENABLED: "true"
  MTLS_CERT_HEADER: "ssl-client-cert"
  WEBHOOK_ENDPOINT_POLICY_ENABLED: "true"
  WEBHOOK_EGRESS_PROXY_ENABLED: "true"
  WEBHOOK_EGRESS_PROXY_HOST: "REPLACE_WITH_EGRESS_PROXY_HOST"
  WEBHOOK_EGRESS_PROXY_PORT: "3128"
  WEBHOOK_REQUIRE_HTTPS: "true"
  WEBHOOK_REQUIRE_ALLOWLIST: "true"
  WEBHOOK_ALLOW_PRIVATE_ADDRESSES: "false"
  WEBHOOK_ALLOWED_PORTS: "443"
  WEBHOOK_ALLOWED_HOSTS: "REPLACE_WITH_APPROVED_PSP_WEBHOOK_HOSTS"
  SPRING_KAFKA_BOOTSTRAP_SERVERS: "REPLACE_WITH_PROD_KAFKA:9092"
  KAFKA_SECURITY_PROTOCOL: "SASL_SSL"
  KAFKA_SASL_MECHANISM: "SCRAM-SHA-512"
  KAFKA_SSL_ENDPOINT_IDENTIFICATION_ALGORITHM: "https"
  KAFKA_SSL_TRUSTSTORE_LOCATION: "/var/run/secrets/trust/kafka-truststore.p12"
  KAFKA_SSL_TRUSTSTORE_TYPE: "PKCS12"
  KAFKA_SSL_KEYSTORE_LOCATION: "/var/run/secrets/trust/kafka-keystore.p12"
  KAFKA_SSL_KEYSTORE_TYPE: "PKCS12"
  OUTBOX_QUEUE_ENABLED: "true"
  OUTBOX_SCHEMA_ALLOW_LEGACY: "false"
  OUTBOX_QUEUE_TOPIC: "switching.outbox.dispatch"
  OUTBOX_QUEUE_GROUP_ID: "switching-outbox-dispatcher"
  BOL_RTGS_URL: "https://REPLACE_WITH_BOL_RTGS_HOST/rtgs/pacs009"
  BOL_FIU_URL: "https://REPLACE_WITH_BOL_FIU_HOST/fiu"
  AML_SCREENING_FAIL_CLOSED: "true"
  AML_BOL_SANCTIONS_ENABLED: "true"
  AML_BOL_SANCTIONS_URL: "https://REPLACE_WITH_BOL_FIU_HOST/fiu/sanctions/list"
  AML_BOL_SANCTIONS_MIN_RECORDS: "1"
  AML_OFAC_SANCTIONS_ENABLED: "true"
  AML_OFAC_SANCTIONS_URL: "https://sanctionslistservice.ofac.treas.gov/api/PublicationPreview/exports/SDN.XML"
  AML_OFAC_SANCTIONS_MIN_RECORDS: "100"
  AML_UN_SANCTIONS_ENABLED: "true"
  AML_UN_SANCTIONS_URL: "https://scsanctions.un.org/resources/xml/en/consolidated.xml"
  AML_UN_SANCTIONS_MIN_RECORDS: "100"
  AML_SANCTIONS_MAXIMUM_AGE: "30h"
  RTGS_CALLBACK_IP_WHITELIST: "REPLACE_WITH_BOL_CALLBACK_CIDRS"
  ARCHIVE_DB_URL: "jdbc:postgresql://REPLACE_WITH_ARCHIVE_DB_HOST:5432/switching_archive?sslmode=verify-full&sslrootcert=/var/run/secrets/trust/postgres-ca.crt"
  ARCHIVE_DB_USERNAME: "switching_archive"
  OBJECT_STORAGE_ENDPOINT: "https://REPLACE_WITH_OBJECT_STORAGE_HOST"
  OBJECT_STORAGE_BUCKET: "switching-archive"
  PROMPTPAY_API_URL: "https://REPLACE_WITH_PROMPTPAY_GATEWAY/promptpay"
  CNAPS_API_URL: "https://REPLACE_WITH_CNAPS_GATEWAY/cnaps"
  NAPAS_API_URL: "https://REPLACE_WITH_NAPAS_GATEWAY/napas"
  SWIFT_API_URL: "https://REPLACE_WITH_SWIFT_GATEWAY/swift"
  ACCOUNT_LOOKUP_BASE_URL: "https://REPLACE_WITH_ACCOUNT_LOOKUP_GATEWAY"
  WEBHOOK_ENCRYPTION_PROVIDER: "vault-transit"
  WEBHOOK_VAULT_AUTH_METHOD: "kubernetes"
  WEBHOOK_VAULT_KUBERNETES_AUTH_MOUNT: "kubernetes/REPLACE_WITH_CLUSTER_NAME"
  WEBHOOK_VAULT_KUBERNETES_ROLE: "switching-webhook"
  WEBHOOK_VAULT_SERVICE_ACCOUNT_TOKEN_FILE: "/var/run/secrets/vault/token"
  VAULT_ADDR: "https://REPLACE_WITH_VAULT_HOST:8200"
  VAULT_NAMESPACE: ""
  WEBHOOK_VAULT_TRANSIT_MOUNT: "transit"
  WEBHOOK_VAULT_TRANSIT_KEY: "switching-webhook"
  WEBHOOK_VAULT_CONNECT_TIMEOUT: "3s"
  WEBHOOK_VAULT_REQUEST_TIMEOUT: "5s"
  WEBHOOK_SECRET_ROTATION_GRACE_MINUTES: "60"
  WEBHOOK_SECRET_ROTATION_MAX_GRACE_MINUTES: "10080"
