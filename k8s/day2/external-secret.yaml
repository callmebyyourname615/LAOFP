apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: switching-day2-runtime
  namespace: switching
spec:
  refreshInterval: 5m
  secretStoreRef:
    kind: SecretStore
    name: vault-backend
  target:
    name: switching-day2-runtime
    creationPolicy: Owner
  data:
    - secretKey: RELEASE_REFERENCE
      remoteRef: {key: switching/production/release, property: reference}
    - secretKey: RELEASE_GIT_COMMIT
      remoteRef: {key: switching/production/release, property: gitCommit}
    - secretKey: RELEASE_IMAGE_DIGEST
      remoteRef: {key: switching/production/release, property: imageDigest}
    - secretKey: PROMETHEUS_URL
      remoteRef: {key: switching/production/observability, property: prometheusUrl}
    - secretKey: DAY2_DATABASE_URL
      remoteRef: {key: switching/production/database, property: reconciliationUrl}
