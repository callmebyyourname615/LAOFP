apiVersion: autoscaling.k8s.io/v1
kind: VerticalPodAutoscaler
metadata:
  name: switching-api-recommendation
  namespace: switching
spec:
  targetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: switching-api
  updatePolicy:
    updateMode: Off
  resourcePolicy:
    containerPolicies:
      - containerName: switching-api
        controlledResources: [cpu, memory]
        minAllowed: {cpu: 500m, memory: 768Mi}
        maxAllowed: {cpu: '4', memory: 2Gi}
