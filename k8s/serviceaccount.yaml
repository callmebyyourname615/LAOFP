apiVersion: v1
kind: ServiceAccount
metadata:
  name: switching-api
  namespace: switching
  labels:
    app: switching-api
automountServiceAccountToken: false
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: switching-api
  namespace: switching
rules:
  - apiGroups: [""]
    resources: ["configmaps"]
    verbs: ["get", "list"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: switching-api
  namespace: switching
subjects:
  - kind: ServiceAccount
    name: switching-api
    namespace: switching
roleRef:
  kind: Role
  name: switching-api
  apiGroup: rbac.authorization.k8s.io
