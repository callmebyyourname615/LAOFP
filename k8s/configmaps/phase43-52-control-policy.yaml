apiVersion: v1
kind: ConfigMap
metadata:
  name: switching-phase43-52-control-policy
data:
  limit-policy-timezone: "Asia/Vientiane"
  manual-adjustment-max-pending-hours: "4"
  crypto-rotation-warning-days: "30"
  dependency-probe-timeout-seconds: "5"
  evidence-verification-max-age-hours: "24"
  decommission-minimum-approval-roles: "3"
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: switching-third-party-probe-config
  annotations:
    switching.io/replace-before-enabling: "true"
data:
  dependencies.yaml: |
    dependencies:
      - code: REPLACE_ME
        name: Replace before enabling the CronJob
        type: OTHER
        endpoint: https://replace.invalid/health
        criticality: LOW
        timeout_seconds: 5
        expected_status: 200
        sla:
          availability_target: 0.99
          latency_p95_ms: 2000
          failure_threshold: 3
          recovery_success_threshold: 2
          open_seconds: 60
