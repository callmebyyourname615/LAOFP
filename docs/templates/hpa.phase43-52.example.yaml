apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: switching-api
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: switching-api
  minReplicas: 3
  maxReplicas: 12
  behavior:
    scaleDown:
      stabilizationWindowSeconds: 300
      policies:
        - type: Percent
          value: 25
          periodSeconds: 60
    scaleUp:
      stabilizationWindowSeconds: 60
      policies:
        - type: Percent
          value: 100
          periodSeconds: 60
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 65
